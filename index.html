<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تأثيرات مضحكة</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: black;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    cursor: pointer;
  }

  h1 {
    font-size: 3em;
    color: lime;
    animation: glitch 0.2s infinite;
    position: absolute;
  }

  @keyframes glitch {
    0% {transform: translate(0,0); color: lime;}
    20% {transform: translate(-5px,5px); color: cyan;}
    40% {transform: translate(5px,-5px); color: magenta;}
    60% {transform: translate(-5px,-5px); color: yellow;}
    80% {transform: translate(5px,5px); color: orange;}
    100% {transform: translate(0,0); color: lime;}
  }

  .particle {
    position: absolute;
    width: 5px;
    height: 5px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
  }
</style>
</head>
<body>

<h1>اضغط هنا 🤪</h1>

<script>
const colors = ["lime","cyan","magenta","yellow","orange","#00ff94","#ff00ff","#00ffff"];

document.body.addEventListener('click', (e) => {
  const particle = document.createElement('div');
  particle.className = 'particle';
  particle.style.left = e.clientX + 'px';
  particle.style.top = e.clientY + 'px';
  particle.style.background = colors[Math.floor(Math.random()*colors.length)];
  document.body.appendChild(particle);

  let dx = (Math.random()-0.5)*10;
  let dy = (Math.random()-0.5)*10;
  let life = 0;

  function move() {
    if(life>30){
      particle.remove();
      return;
    }
    particle.style.left = (particle.offsetLeft+dx)+'px';
    particle.style.top = (particle.offsetTop+dy)+'px';
    life++;
    requestAnimationFrame(move);
  }
  move();
});
</script>

</body>
</html>
