function showQuestion(){
if(current < questions.length){
document.getElementById("quiz").innerHTML = `
<div class="question">${questions[current].q}</div>
<button class="option" onclick="answer(2)">نعم</button>
<button class="option" onclick="answer(0)">لا</button>
`;
}else{
showResult();
}
}

function answer(value){
traits[questions[current].t] += value;
current++;
showQuestion();
}

function calculateMatch(user, character){
let total = 0;
let max = 0;
for(let key in user){
let diff = Math.abs(user[key] - character[key]);
total += (10 - diff);
max += 10;
}
return Math.round((total/max)*100);
}

function showResult(){
let bestMatch = null;
let highest = 0;

characters.forEach(char=>{
let percent = calculateMatch(traits, char.traits);
if(percent > highest){
highest = percent;
bestMatch = char;
}
});

document.getElementById("quiz").style.display="none";

document.getElementById("result").innerHTML = `
أنت تشبه <b>${bestMatch.name}</b><br>
نسبة التطابق: ${highest}%<br>
<img src="${bestMatch.image}">
`;
}

showQuestion();

</script>
