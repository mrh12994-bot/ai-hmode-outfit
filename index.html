<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موقع صور مضحكة</title>
<style>
  body {
    font-family: sans-serif;
    background: linear-gradient(120deg, #ff9a9e, #fad0c4);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 50px 0;
  }
  h1 {
    color: #fff;
    text-shadow: 0 0 10px #000;
  }
  input[type="file"] {
    margin: 20px 0;
  }
  #output img {
    max-width: 300px;
    margin: 10px;
    border-radius: 15px;
    border: 3px solid #fff;
    box-shadow: 0 0 15px #000;
  }
</style>
</head>
<body>

<h1>ارفع صورتك وخلينا نضحك 😂</h1>
<input type="file" id="fileInput" accept="image/*">
<div id="output"></div>

<script>
const fileInput = document.getElementById('fileInput');
const output = document.getElementById('output');

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    const img = document.createElement('img');
    img.src = event.target.result;

    // إضافة تأثير مضحك عشوائي
    const filters = ["grayscale(100%)", "invert(100%)", "blur(3px)", "sepia(100%)", "contrast(200%)"];
    img.style.filter = filters[Math.floor(Math.random() * filters.length)];

    output.innerHTML = "";
    output.appendChild(img);
  }
  reader.readAsDataURL(file);
});
</script>

</body>
</html>
