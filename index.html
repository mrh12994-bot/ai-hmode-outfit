<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
    <style>
        body { font-family: Arial; text-align:center; margin-top:50px; }
        button { font-size:20px; padding:10px 20px; margin:10px; cursor:pointer; }
        #result { margin-top:20px; font-size:22px; font-weight:bold; }
    </style>
</head>
<body>

<h1>Rock Paper Scissors</h1>
<p>اختر: حجر، ورقة، مقص</p>

<button onclick="play('rock')">حجر</button>
<button onclick="play('paper')">ورقة</button>
<button onclick="play('scissors')">مقص</button>

<div id="result"></div>

<script>
function play(userChoice){
    const choices = ['rock', 'paper', 'scissors'];
    const computerChoice = choices[Math.floor(Math.random() * 3)];

    let result = '';
    if(userChoice === computerChoice){
        result = "تعادل!";
    } else if(
        (userChoice==='rock' && computerChoice==='scissors') ||
        (userChoice==='paper' && computerChoice==='rock') ||
        (userChoice==='scissors' && computerChoice==='paper')
    ){
        result = "فزت!";
    } else {
        result = "خسرت!";
    }

    document.getElementById('result').innerHTML = `أنت اخترت: ${userChoice} | الكمبيوتر: ${computerChoice} <br> ${result}`;
}
</script>

</body>
</html>
