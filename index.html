<!DOCTYPE html>
<html>
<head>
  <title>AI Outfit Tool</title>
</head>
<body>
  <h2>AI Outfit Changer</h2>

  <input type="file" id="imageInput"><br><br>

  <select id="style">
    <option value="formal suit">Formal</option>
    <option value="swimsuit">Swimsuit</option>
    <option value="luxury outfit">Luxury</option>
  </select>

  <button onclick="send()">Change</button>

  <br><br>
  <img id="result" width="300"/>

<script>
async function send() {
  const file = document.getElementById("imageInput").files[0];
  const style = document.getElementById("style").value;

  const reader = new FileReader();
  reader.onload = async function() {
    const base64 = reader.result.split(",")[1];

    const response = await fetch("https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-2", {
      method: "POST",
      headers: {
        "Authorization": "Bearer YOUR_TOKEN_HERE",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        inputs: `photo of a person wearing ${style}`
      })
    });

    const blob = await response.blob();
    document.getElementById("result").src = URL.createObjectURL(blob);
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
