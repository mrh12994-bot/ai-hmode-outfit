<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فحص قوة كلمة المرور</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: rgba(0,0,0,0.7);
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,255,255,0.3);
    width: 350px;
    text-align: center;
  }

  h1 {
    margin-bottom: 30px;
    font-size: 24px;
    color: #00ffe7;
    text-shadow: 0 0 10px #00ffe7;
  }

  input[type="password"] {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-bottom: 20px;
    font-size: 16px;
  }

  .strength-bar {
    height: 15px;
    width: 100%;
    background: #444;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .strength-fill {
    height: 100%;
    width: 0%;
    background: red;
    transition: width 0.3s ease, background 0.3s ease;
  }

  .strength-text {
    font-weight: bold;
    text-transform: uppercase;
    color: #fff;
  }
</style>
</head>
<body>

<div class="container">
  <h1>فحص قوة كلمة المرور</h1>
  <input type="password" id="password" placeholder="أدخل كلمة المرور هنا">
  <div class="strength-bar">
    <div class="strength-fill" id="strength-fill"></div>
  </div>
  <div class="strength-text" id="strength-text">ضعيفة</div>
</div>

<script>
const password = document.getElementById('password');
const strengthFill = document.getElementById('strength-fill');
const strengthText = document.getElementById('strength-text');

password.addEventListener('input', () => {
  const val = password.value;
  let strength = 0;

  if (val.length >= 8) strength += 1;
  if (/[A-Z]/.test(val)) strength += 1;
  if (/[0-9]/.test(val)) strength += 1;
  if (/[^A-Za-z0-9]/.test(val)) strength += 1;

  switch(strength) {
    case 0:
    case 1:
      strengthFill.style.width = '25%';
      strengthFill.style.background = 'red';
      strengthText.textContent = 'ضعيفة';
      break;
    case 2:
      strengthFill.style.width = '50%';
      strengthFill.style.background = 'orange';
      strengthText.textContent = 'متوسطة';
      break;
    case 3:
      strengthFill.style.width = '75%';
      strengthFill.style.background = '#00bfff';
      strengthText.textContent = 'قوية';
      break;
    case 4:
      strengthFill.style.width = '100%';
      strengthFill.style.background = '#00ff94';
      strengthText.textContent = 'قوية جدًا';
      break;
  }
});
</script>

</body>
</html>
